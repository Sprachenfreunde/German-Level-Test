<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Einstufungstest | German Level Test</title>
    <style>
        :root { --primary: #003366; --accent: #d9534f; --bg: #f4f7f9; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; color: var(--text); }
        #quiz-container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 700px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #eee; }
        .progress-info { font-weight: 600; color: var(--primary); }
        #timer { font-size: 1.2rem; font-weight: 700; color: var(--accent); background: #fff5f5; padding: 5px 15px; border-radius: 20px; border: 1px solid #ffc1c1; }
        .question-box { min-height: 100px; margin-bottom: 30px; }
        .question-text { font-size: 1.3rem; font-weight: 600; line-height: 1.5; color: #1a1a1a; }
        .options { display: grid; gap: 12px; }
        .opt-btn { padding: 16px 20px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fff; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1.05rem; }
        .opt-btn:hover { background: #f0f7ff; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        #result { display: none; text-align: center; padding: 20px 0; }
        .level-badge { font-size: 4rem; color: var(--primary); font-weight: 900; margin: 15px 0; }
        .score-info { font-size: 1.2rem; margin-bottom: 10px; color: #555; font-weight: bold; }
        .desc { font-size: 1.1rem; line-height: 1.7; color: #444; margin-bottom: 35px; text-align: left; background: #f9f9f9; padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .desc strong { color: var(--primary); font-size: 1.2rem; }
        .desc small { display: block; margin-top: 10px; color: #777; font-style: italic; border-top: 1px solid #ddd; padding-top: 10px; }
        .retry-btn { padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: 0.3s; }
        .retry-btn:hover { background: #002244; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-box">
        <div class="header">
            <div class="progress-info">Frage / Question <span id="current-idx">1</span> of 50</div>
            <div id="timer">30:00</div>
        </div>
        <div class="question-box">
            <div class="question-text" id="question-text">Lädt... / Loading...</div>
        </div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result">
        <h2 style="margin-top:0;">Ihr Ergebnis / Your Result</h2>
        <p class="score-info" id="result-score"></p>
        <div class="level-badge" id="result-level"></div>
        <div class="desc" id="result-msg"></div>
        <button class="retry-btn" onclick="location.reload()">Test neu starten / Restart Test</button>
    </div>
</div>

<script>
    const quizData = [
        // A1
        { q: "Wählen Sie die richtige Form: 'Hallo, ich ___ Max.'", a: ["bin", "bist", "ist", "sind"], cor: 0 },
        { q: "Was ist die richtige Antwort? 'Woher kommst du?'", a: ["Ich komme aus Korea.", "Ich wohne in Korea.", "Ich bin Korea.", "Ich komme nach Korea."], cor: 0 },
        { q: "Ergänzen Sie den Artikel: 'Das ist ___ Apfel.' (m.)", a: ["ein", "eine", "einen", "einem"], cor: 0 },
        { q: "Welches Verb passt? 'Wir ___ gern Pizza.'", a: ["essen", "esst", "isst", "esse"], cor: 0 },
        { q: "Wie spät ist es? (08:30 Uhr)", a: ["halb neun", "halb acht", "acht Uhr", "neun nach acht"], cor: 0 },
        { q: "Verneinen Sie den Satz: 'Ich habe ein Auto.'", a: ["Ich habe kein Auto.", "Ich habe nicht Auto.", "Ich nicht habe Auto.", "Ich habe keine Auto."], cor: 0 },
        { q: "Possessivartikel: 'Das ist mein Bruder. ___ Name ist Paul.'", a: ["Sein", "Ihr", "Mein", "Dein"], cor: 0 },
        { q: "Welcher Satz ist korrekt?", a: ["Heute gehe ich ins Kino.", "Heute ich gehe ins Kino.", "Ich heute gehe ins Kino.", "Gehe ich heute ins Kino."], cor: 0 },
        { q: "Ergänzen Sie die Präposition: 'Ich fahre ___ dem Zug.'", a: ["mit", "bei", "zu", "in"], cor: 0 },
        { q: "Frage nach dem Ort: '___ ist die Toilette?'", a: ["Wo", "Wer", "Was", "Wie"], cor: 0 },
        // A2
        { q: "Modalverb (Fähigkeit): 'Ich ___ gut Deutsch sprechen.'", a: ["kann", "muss", "will", "darf"], cor: 0 },
        { q: "Perfekt: 'Ich ___ gestern nach Hause gegangen.'", a: ["bin", "habe", "war", "hatte"], cor: 0 },
        { q: "Komparativ: 'Mein Bruder ist ___ als ich.' (groß)", a: ["größer", "groß", "am größten", "großer"], cor: 0 },
        { q: "Trennbares Verb: 'Ich ___ jeden Morgen um 7 Uhr ___.'", a: ["stehe...auf", "aufstehe", "auf...stehe", "stehe...aus"], cor: 0 },
        { q: "Relativsatz: 'Das ist der Mann, ___ ich gesehen habe.'", a: ["den", "der", "dem", "dessen"], cor: 0 },
        { q: "Nebensatz (Kausal): 'Ich bin müde, ___ ich viel gearbeitet habe.'", a: ["weil", "denn", "aber", "deshalb"], cor: 0 },
        { q: "Reflexivpronomen: 'Ich freue ___ auf den Urlaub.'", a: ["mich", "dich", "sich", "mir"], cor: 0 },
        { q: "Pluralform: Wie heißt der Plural von 'das Buch'?", a: ["die Bücher", "die Buchs", "die Büchern", "die Buche"], cor: 0 },
        { q: "Adjektivdeklination: 'Ich trinke einen heiß___ Tee.' (Mask, Akk)", a: ["en", "er", "es", "e"], cor: 0 },
        { q: "Höfliche Bitte: '___ ich das Fenster öffnen?'", a: ["Darf", "Muss", "Soll", "Will"], cor: 0 },
        // B1
        { q: "Passiv Präteritum: 'Das Haus ___ im Jahr 1990 ___.'", a: ["wurde...gebaut", "ist...gebaut", "hat...gebaut", "wird...bauen"], cor: 0 },
        { q: "Konjunktiv II: 'Wenn ich Zeit ___, ___ ich dir helfen.'", a: ["hätte...würde", "habe...werde", "hatte...würde", "hätte...werde"], cor: 0 },
        { q: "Adverbialer Anschluss: 'Ich habe kein Geld, ___ kaufe ich das Auto.'", a: ["trotzdem", "deshalb", "weil", "obwohl"], cor: 0 },
        { q: "Passiv mit Modalverb: 'Das Problem ___ gelöst ___.'", a: ["muss...werden", "wird...müssen", "ist...worden", "muss...worden"], cor: 0 },
        { q: "Verben mit Präpositionen: 'Ich interessiere mich ___ Politik.'", a: ["für", "an", "über", "auf"], cor: 0 },
        { q: "Nebensatz am Anfang: '___ ich krank war, konnte ich nicht kommen.'", a: ["Da", "Denn", "Deshalb", "Darum"], cor: 0 },
        { q: "Infinitiv mit zu: 'Ich habe keine Lust, heute ___.' (einkaufen)", a: ["einkaufen zu", "zu einkaufen", "einzukaufen", "einkaufe zu"], cor: 2 },
        { q: "Doppelkonjunktion: 'Je mehr ich lerne, ___ ___ verstehe ich.'", a: ["desto mehr", "umso viel", "desto viel", "als mehr"], cor: 0 },
        { q: "Temporale Präpositionen: 'Wir treffen uns ___ Montag ___ 10 Uhr.'", a: ["am...um", "im...an", "an...am", "um...am"], cor: 0 },
        { q: "Konjunktiv II (Höflichkeit): '___ Sie bitte so nett?'", a: ["Wären", "Sind", "Hätten", "Werden"], cor: 0 },
        // B2
        { q: "Nomen-Verb-Verbindung: 'Wir müssen eine Entscheidung ___.'", a: ["treffen", "machen", "haben", "tun"], cor: 0 },
        { q: "Irreale Bedingung: 'Wenn du gekommen ___, ___ wir uns gesehen.'", a: ["wärest...hätten", "bist...haben", "wärst...haben", "hättest...wären"], cor: 0 },
        { q: "Partizipialattribute: '___ am Bahnhof ___, rief er mich an.'", a: ["Angekommen", "Ankommend", "Ankommen", "Ankunft"], cor: 0 },
        { q: "Futur II (Vermutung): 'Er ___ wohl den Bus ___ ___.'", a: ["wird...verpasst haben", "wird...verpassen", "hat...verpasst", "würde...haben"], cor: 0 },
        { q: "Konzessivsätze: '___ er viel Geld hat, ist er nicht glücklich.'", a: ["Obwohl", "Trotzdem", "Sondern", "Falls"], cor: 0 },
        { q: "Relativsatz mit Präposition: 'Das ist der Punkt, ___ ich mich konzentriere.'", a: ["auf den", "an den", "worauf", "über den"], cor: 0 },
        { q: "Ersatzform des Passivs: 'Der Text ist leicht ___.'", a: ["zu verstehen", "verstanden", "verstehen", "zu verstanden"], cor: 0 },
        { q: "Pronominaladverbien: 'Ich rate dir ___, mehr Sport zu treiben.'", a: ["dazu", "dafür", "darum", "davon"], cor: 0 },
        { q: "Partizip I: 'Die ___ Sonne blendet mich.' (scheinen)", a: ["scheinende", "geschienene", "scheinend", "scheinen"], cor: 0 },
        { q: "Feste Wendung: 'Es kommt ___ ___, ob wir wandern gehen.'", a: ["darauf an", "darüber nach", "daran teil", "davon aus"], cor: 0 },
        // C1
        { q: "Nominalisierung: 'Das ___ der Umwelt ist ein wichtiges Thema.'", a: ["Schützen", "Schutz", "Schützer", "Schützung"], cor: 0 },
        { q: "Indirekte Rede: 'Er sagte, er ___ keine Zeit.'", a: ["habe", "hat", "hätte", "hab"], cor: 0 },
        { q: "Präpositional-Kausal: 'Er hat ___ gesundheitlichen Gründen abgebrochen.'", a: ["aus", "wegen", "durch", "infolge"], cor: 0 },
        { q: "Erweitertes Attribut: 'Ein ___ Problem.' (nicht vorhergesehen)", a: ["unvorhergesehenes", "unvorhergesehene", "unvorhergesehenen", "unvorhergesehener"], cor: 0 },
        { q: "Doppelkonnektor: 'Ich mag ___ Tee ___ Kaffee.' (beides nicht)", a: ["weder...noch", "entweder...oder", "sowohl...als auch", "nicht nur...sondern"], cor: 0 },
        { q: "Genitiv: '___ des Regens sind wir zu Hause geblieben.'", a: ["Wegen", "Trotz", "Während", "Infolge"], cor: 0 },
        { q: "Lexik: 'Er hat die Prüfung mit Erfolg ___.'", a: ["bestanden", "gemacht", "geschafft", "erfolgt"], cor: 0 },
        { q: "Diplomatische Ablehnung: 'Ich ___ ja gerne, aber...'", a: ["würده", "werde", "soll", "bin"], cor: 0 },
        { q: "Fachsprache: 'Die ___ Kosten sind enorm.' (entstehen)", a: ["anfallenden", "kommenden", "machenden", "gehenden"], cor: 0 },
        { q: "Präposition: 'In Bezug ___ Ihr Schreiben...'", a: ["auf", "zu", "mit", "für"], cor: 0 }
    ];

    let currentIdx = 0;
    let score = 0;
    let continuousWrong = 0;
    const MAX_CONTINUOUS_WRONG = 5; 
    let timeLeft = 1800; 
    let timerInterval;

    function startTimer() {
        const timerEl = document.getElementById('timer');
        timerInterval = setInterval(() => {
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            timerEl.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endQuiz("Time Up / Zeit abgelaufen");
            }
            timeLeft--;
        }, 1000);
    }

    function loadQuestion() {
        if (currentIdx >= quizData.length) {
            endQuiz("Test Completed / Abgeschlossen");
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById('current-idx').innerText = currentIdx + 1;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if (selected === quizData[currentIdx].cor) {
            score++;
            continuousWrong = 0;
        } else {
            continuousWrong++;
        }

        if (continuousWrong >= MAX_CONTINUOUS_WRONG) {
            endQuiz("Target Level Identified / Niveau erreicht");
            return;
        }

        currentIdx++;
        loadQuestion();
    }

    function endQuiz(msg) {
        clearInterval(timerInterval);
        document.getElementById('quiz-box').style.display = 'none';
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        
        let level = "A1";
        let message = "";
        
        if (score >= 45) {
            level = "C1";
            message = `<strong>Exzellente Kenntnisse!</strong><br>
                       Sie können komplexe Texte verstehen und sich spontan und fließend ausdrücken. 
                       Wir empfehlen Ihnen unseren Oberstufenkurs (C1).
                       <small>Advanced level. You can understand complex texts and express yourself fluently. We recommend our C1 Advanced course.</small>`;
        } else if (score >= 35) {
            level = "B2";
            message = `<strong>Gute Mittelstufenkenntnisse!</strong><br>
                       Sie können die Hauptinhalte komplexer Texte verstehen und sich zu Themen detailliert äußern. 
                       Der B2-Kurs ist ideal für Sie.
                       <small>Upper-intermediate level. You can understand the main ideas of complex texts and speak in detail on various topics. B2 is ideal for you.</small>`;
        } else if (score >= 25) {
            level = "B1";
            message = `<strong>Solide Grundkenntnisse!</strong><br>
                       Sie können die Hauptpunkte verstehen, wenn klare Standardsprache verwendet wird. 
                       Wir empfehlen Ihnen den B1-Kurs.
                       <small>Intermediate level. You can understand main points of clear standard input on familiar matters. We recommend our B1 course.</small>`;
        } else if (score >= 12) {
            level = "A2";
            message = `<strong>Grundlegende Kenntnisse!</strong><br>
                       Sie können Sätze und häufig gebrauchte Ausdrücke verstehen. 
                       Im A2-Kurs werden Sie Ihre Basiskenntnisse erweitern.
                       <small>Pre-intermediate level. You can understand sentences and frequently used expressions. A2 will help you expand your basics.</small>`;
        } else {
            level = "A1";
            message = `<strong>Herzlich willkommen!</strong><br>
                       Sie fangen gerade erst an oder haben sehr geringe Vorkenntnisse. 
                       Unser A1-Kurs für Anfänger ist der perfekte Start für Sie.
                       <small>Beginner level. You are just starting or have very little prior knowledge. Our A1 course is the perfect start for you.</small>`;
        }

        document.getElementById('result-level').innerText = level;
        document.getElementById('result-score').innerText = `Score: ${score} / 50 (${msg})`;
        document.getElementById('result-msg').innerHTML = message;
    }

    window.onload = () => {
        startTimer();
        loadQuestion();
    };
</script>

</body>
</html>
