<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprachenfreunde Einstufungstest</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f7f9;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:750px;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.option{
  padding:12px;
  border:1px solid #ddd;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
}

.option:hover{
  background:#eef5ff;
}

.hidden{ display:none; }

.level{
  font-size:40px;
  font-weight:bold;
  color:#003366;
}

#timer{
  font-weight:bold;
  color:#d9534f;
}

.context{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
}

/* START SCREEN */
#start{
  text-align:center;
}

.brand{
  font-size:36px;
  font-weight:800;
  color:#003366;
  margin-bottom:10px;
  letter-spacing:1px;
}

.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:5px;
}

.subtitle{
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

.start-btn{
  padding:12px 25px;
  font-size:16px;
  border:none;
  background:#003366;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start">

  <div class="brand">Sprachenfreunde</div>
  <div class="title">Deutsch Einstufungstest</div>
  <div class="subtitle">50 Fragen · Niveau A1–C1 · ca. 30 Minuten</div>

  <button class="start-btn" id="startBtn">Start Test</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">

  <div>
    <span id="info"></span> |
    <span id="timer"></span>
  </div>

  <div class="context" id="context"></div>

  <h2 id="question"></h2>
  <div id="options"></div>

</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <h2>Ergebnis</h2>
  <div class="level" id="level"></div>
  <p id="score"></p>
</div>

</div>

<script>
"use strict";

/* =========================
   QUESTIONS (50)
========================= */
const questions = [
{l:1,c:"Verb sein",q:"Hallo, ich ___ Max.",o:["bin","bist","ist","sind"],a:0},
{l:1,c:"Herkunft",q:"Woher kommst du?",o:["Ich komme aus Korea.","Ich wohne Korea.","Ich bin Korea.","Ich komme nach Korea."],a:0},
{l:1,c:"Artikel",q:"Das ist ___ Apfel.",o:["ein","eine","einen","einem"],a:0},
{l:1,c:"Alltag",q:"Wir ___ gern Pizza.",o:["essen","esst","isst","esse"],a:0},
{l:1,c:"Zeit",q:"Wie spät ist es?",o:["halb neun","halb acht","acht Uhr","neun Uhr"],a:0},

{l:2,c:"Modalverb",q:"Ich ___ gut Deutsch sprechen.",o:["kann","muss","will","darf"],a:0},
{l:2,c:"Perfekt",q:"Ich ___ gearbeitet.",o:["habe","bin","war","hatte"],a:0},
{l:2,c:"Präposition",q:"Ich fahre ___ dem Bus.",o:["mit","bei","zu","in"],a:0},
{l:2,c:"Komparativ",q:"Er ist ___ als ich.",o:["größer","groß","am größten","großer"],a:0},
{l:2,c:"Reflexiv",q:"Ich freue ___.",o:["mich","dich","sich","mir"],a:0},

{l:3,c:"Kausalsatz",q:"Ich bleibe zu Hause, ___ ich krank bin.",o:["weil","denn","aber","deshalb"],a:0},
{l:3,c:"Relativsatz",q:"Der Mann, ___ ich kenne.",o:["den","der","dem","dessen"],a:0},
{l:3,c:"Infinitiv",q:"Ich habe keine Lust ___.",o:["einzukaufen","einkaufen zu","zu einkaufen","einkaufe zu"],a:0},
{l:3,c:"Doppelkonnektor",q:"Je mehr ich lerne, ___ besser.",o:["desto","weil","denn","aber"],a:0},
{l:3,c:"Zeit",q:"Wir treffen uns ___ Montag ___ 10 Uhr.",o:["am ... um","im ... an","an ... am","um ... am"],a:0},

{l:4,c:"Konjunktiv II",q:"Wenn ich Zeit ___, würde ich helfen.",o:["hätte","habe","hatte","bin"],a:0},
{l:4,c:"Passiv",q:"Das Haus ___ gebaut.",o:["wurde","ist","hat","wird"],a:0},
{l:4,c:"Konzessiv",q:"___ er reich ist, ist er nicht glücklich.",o:["Obwohl","Trotzdem","Sondern","Falls"],a:0},
{l:4,c:"Relativ",q:"Das ist der Punkt, ___ ich mich konzentriere.",o:["auf den","an den","worauf","über den"],a:0},
{l:4,c:"Infinitiv",q:"Der Text ist leicht ___.",o:["zu verstehen","verstanden","verstehen","zu verstanden"],a:0},

{l:5,c:"Indirekte Rede",q:"Er sagte, er ___ keine Zeit habe.",o:["habe","hat","hatte","hab"],a:0},
{l:5,c:"Nominalisierung",q:"Das ___ der Umwelt ist wichtig.",o:["Schutz","Schützen","Schützer","Schützung"],a:0},
{l:5,c:"Doppel",q:"Ich mag ___ Tee ___ Kaffee.",o:["weder ... noch","entweder ... oder","sowohl ... als auch","nicht nur ... sondern"],a:0},
{l:5,c:"Formell",q:"Er hat ___ Gründen abgebrochen.",o:["aus","wegen","durch","infolge"],a:0},
{l:5,c:"Präposition",q:"In Bezug ___ Ihr Schreiben...",o:["auf","zu","mit","für"],a:0}
];

/* =========================
   STATE
========================= */
let i=0;
let score=0;
let ability=50;
let wrong=0;
let answered=0;

let timeLeft=1800;
let timer;

/* =========================
   START
========================= */
document.getElementById("startBtn").onclick=function(){
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  startTimer();
  load();
};

/* =========================
   TIMER
========================= */
function startTimer(){
  timer=setInterval(()=>{
    timeLeft--;
    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    document.getElementById("timer").innerText=
      `${m}:${s<10?"0":""}${s}`;
    if(timeLeft<=0) end("Zeit abgelaufen");
  },1000);
}

/* =========================
   LOAD
========================= */
function load(){
  if(i>=questions.length || wrong>=8) return end("Test beendet");

  let q=questions[i];

  document.getElementById("info").innerText=`Frage ${i+1}`;
  document.getElementById("context").innerText=q.c;
  document.getElementById("question").innerText=q.q;

  let box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach((opt,idx)=>{
    let d=document.createElement("div");
    d.className="option";
    d.innerText=opt;

    d.onclick=function(){

      answered++;

      if(idx===q.a){
        score++;
        ability+=2;
      }else{
        wrong++;
        ability-=3;
      }

      i++;
      load();
    };

    box.appendChild(d);
  });
}

/* =========================
   END
========================= */
function end(reason){
  clearInterval(timer);

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let level="A1";

  if(ability>85) level="C1";
  else if(ability>70) level="B2";
  else if(ability>55) level="B1";
  else if(ability>40) level="A2";

  let accuracy = answered ? Math.round((score/answered)*100) : 0;

  document.getElementById("level").innerText=level;

  document.getElementById("score").innerHTML=`
    Score: ${score}/50<br>
    Beantwortet: ${answered}<br>
    Falsch: ${wrong}<br>
    Genauigkeit: ${accuracy}%<br>
    (${reason})
  `;
}
</script>

</body>
</html>
